version: '3.8'

services:

  app:
    image: 209330743373.dkr.ecr.us-east-1.amazonaws.com/docker-project:latest
    container_name: docker-project-app-prod
    ports:
      - "8080:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=mongo
    depends_on:
      - mongo
    networks:
      - app-network
    restart: unless-stopped

  mongo:
    image: mongo:6-jammy
    container_name: docker-project-db-prod
    ports:
      - "27018:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=secret123
    volumes:
      - mongo-data-prod:/data/db
    networks:
      - app-network
    restart: unless-stopped

  mongo-express:
    image: mongo-express
    container_name: docker-project-dbui-prod
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=secret123
      - ME_CONFIG_MONGODB_URL=mongodb://admin:secret123@mongo:27017/
    depends_on:
      - mongo
    networks:
      - app-network
    restart: unless-stopped

volumes:
  mongo-data-prod:

networks:
  app-network:
    driver: bridge