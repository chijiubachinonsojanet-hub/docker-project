<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎬 NetWatch</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">🎬 NetWatch</div>
    <div class="nav-right">
      <span id="movie-count">0 Movies</span>
      <button class="btn-red" onclick="toggleForm()">+ Add Movie</button>
    </div>
  </nav>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-content">
      <h1>Unlimited Movies</h1>
      <p>Your personal collection — powered by Docker & MongoDB</p>
      <button class="btn-red" onclick="seedMovies()">
        ▶ Load Sample Movies
      </button>
    </div>
  </div>

  <!-- SEARCH & FILTER -->
  <div class="controls">
    <input 
      type="text" 
      id="search" 
      placeholder="🔍  Search movies..." 
      oninput="filterMovies()"
    />
    <select id="genre-filter" onchange="filterMovies()">
      <option value="">All Genres</option>
      <option value="Action">Action</option>
      <option value="Sci-Fi">Sci-Fi</option>
      <option value="Crime">Crime</option>
      <option value="Animation">Animation</option>
      <option value="Drama">Drama</option>
      <option value="Horror">Horror</option>
    </select>
  </div>

  <!-- ADD MOVIE FORM -->
  <div class="form-box" id="add-form" style="display:none">
    <h2>Add New Movie</h2>
    <div class="form-grid">
      <input type="text"   id="f-title"  placeholder="Movie Title"/>
      <input type="text"   id="f-genre"  placeholder="Genre"/>
      <input type="number" id="f-year"   placeholder="Year"/>
      <input type="number" id="f-rating" placeholder="Rating (1-10)" step="0.1" max="10"/>
      <input type="text"   id="f-image"  placeholder="Image URL (optional)"/>
      <textarea id="f-desc" placeholder="Movie Description"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-red"  onclick="addMovie()">Add Movie</button>
      <button class="btn-gray" onclick="toggleForm()">Cancel</button>
    </div>
  </div>

  <!-- MOVIES GRID -->
  <div class="section-label">🍿 All Movies</div>
  <div class="movies-grid" id="movies-grid">
    <div class="placeholder">
      Click "Load Sample Movies" to get started!
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="js/app.js"></script>
</body>
</html>
