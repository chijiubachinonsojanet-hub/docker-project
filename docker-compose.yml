services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: netwatch-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netwatch-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URL=mongodb://admin:secret123@mongo:27017/moviesdb?authSource=admin
    depends_on:
      - mongo
    networks:
      - app-network
    restart: unless-stopped

  mongo:
    image: mongo:6-jammy
    container_name: netwatch-db
    ports:
      - "27018:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=secret123
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network
    restart: unless-stopped

  mongo-express:
    image: mongo-express
    container_name: netwatch-dbui
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=secret123
      - ME_CONFIG_MONGODB_URL=mongodb://admin:secret123@mongo:27017/
    depends_on:
      - mongo
    networks:
      - app-network
    restart: unless-stopped

volumes:
  mongo-data:

networks:
  app-network:
    driver: bridge
