version: '3.8'

services:

  # ── Your App ──────────────────────────────
  app:
    build: .
    container_name: docker-project-app
    ports:
      - "8080:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=mongo
    depends_on:
      - mongo
    networks:
      - app-network
    restart: unless-stopped

  # ── MongoDB ───────────────────────────────
  mongo:
    image: mongo:6-jammy
    container_name: docker-project-db
    ports:
      - "27018:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=secret123
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network
    restart: unless-stopped

  # ── Mongo Express (DB Admin UI) ───────────
  mongo-express:
    image: mongo-express
    container_name: docker-project-dbui
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=secret123
      - ME_CONFIG_MONGODB_URL=mongodb://admin:secret123@mongo:27017/
    depends_on:
      - mongo
    networks:
      - app-network

volumes:
  mongo-data:

networks:
  app-network:
    driver: bridge